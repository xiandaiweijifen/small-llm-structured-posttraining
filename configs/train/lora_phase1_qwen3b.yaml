experiment_name: qwen25_3b_phase1_qlora_v1
task_name: ticket_structured_output

model:
  base_model: Qwen/Qwen2.5-3B-Instruct
  max_seq_length: 2048

training:
  method: qlora
  learning_rate: 2e-4
  num_train_epochs: 3
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  warmup_steps: 50

lora:
  r: 16
  alpha: 32
  dropout: 0.05

data:
  train_file: data/processed/phase1_sft_train.jsonl
  val_file: data/processed/phase1_sft_val.jsonl

output:
  save_dir: results/checkpoints/qwen25_3b_phase1_qlora_v1
